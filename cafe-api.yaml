openapi: 3.0.0
info:
  title: SW Cafe API
  description: API for managing cafe products, orders, and stats.
  version: 1.0.0
servers:
  - url: https://example.com/api
paths:
  /products:
    get:
      summary: Get all products
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Add a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created
  /stats:
    post:
      summary: Record a product click
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                productName:
                  type: string
      responses:
        '200':
          description: Stat recorded

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        category:
          type: string
        description:
          type: string
        images:
          type: array
          items:
            type: string
        allergens:
          type: array
          items:
            type: string
        extras:
          type: array
          items:
            $ref: '#/components/schemas/ExtraOption'
        story:
          type: string
    ProductInput:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        category:
          type: string
        description:
          type: string
        images:
          type: array
          items:
            type: string
        allergens:
          type: array
          items:
            type: string
        extras:
          type: array
          items:
            $ref: '#/components/schemas/ExtraOption'
        story:
          type: string
    ExtraOption:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
